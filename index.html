<!DOCTYPE html>
<html>
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💸</text></svg>">

  <title>PocketFriendly</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">

    <h1> 💰PocketFriendly</h1>

    <!-- INPUT SECTION -->
    <div class="card">
      <h2>Add Transaction</h2>

      <input id="amount" type="number" placeholder="Amount" />
      <input id="category" placeholder="Category (food, rent...)" />

      <select id="type">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>

      <button onclick="save()">Add Transaction</button>
    
    </div>

    <!-- INSIGHTS -->
    <div class="card">
      <h2>📊 Insights</h2>
      <h3>Set Limit</h3>
      <input id="budgetLimit" type="number" placeholder="Enter Your Desired Budget Limit" />
      <button onclick="setLimit()"> Set Limit </button>
      <h3>Insight Details</h3>
      <div id="summary">No data yet</div>
    </div>

<!-- TRANSACTION HISTORY -->
 <input
  id="searchInput"
  placeholder="Search transactions..."
  oninput="searchTransactions()"
/>
    <div class="card">
  <h2>📜 Transaction History</h2>
  <ul id="transactionList"></ul>
</div>

    <!-- CHART -->
    <div class="card">
      <h2>Spending Breakdown</h2>
      <canvas id="expenseChart"></canvas>
    </div>

  </div>

<script src="./script.js"></script>
</body>
</html>
